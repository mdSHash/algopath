# Render Blueprint — deploys the AlgoPath code runner.
# To use: push this file to your GitHub repo, then in Render's dashboard
# click New → Blueprint, connect this repo, and apply.
#
# What this provisions:
#   - One free Docker web service named `algopath-runner`
#   - Auto-generated RUNNER_API_KEY (visible in Render's env-vars panel)
#   - Healthcheck on /health
#
# After deploy:
#   1. Copy the service URL (e.g. https://algopath-runner.onrender.com)
#   2. Copy the auto-generated RUNNER_API_KEY
#   3. In Vercel, set:
#         EXEC_BACKEND   = runner
#         RUNNER_URL     = <the service URL>
#         RUNNER_API_KEY = <the same key Render generated>
#   4. Redeploy Vercel
#
# Free-tier note: the service spins down after ~15 min of inactivity, so
# the first Run/Submit after a quiet period takes ~30s to wake up. Subsequent
# requests are instant.

services:
  - type: web
    name: algopath-runner
    runtime: docker
    plan: free
    region: oregon
    rootDir: runner
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: RUNNER_API_KEY
        generateValue: true
      - key: RUN_TIMEOUT_MS
        value: "10000"
      - key: COMPILE_TIMEOUT_MS
        value: "20000"
      - key: ALLOWED_ORIGIN
        value: "*"
